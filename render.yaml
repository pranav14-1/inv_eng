services:
  # The Unified Service (API + Worker)
  # This uses Render's 'Free Web Service' tier which doesn't require a card.
  - type: web
    name: inventory-engine
    runtime: node
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: PORT
        value: 3000
      - key: DB_USER
        sync: false # Get from Neon.tech
      - key: DB_HOST
        sync: false # Get from Neon.tech
      - key: DB_NAME
        sync: false # Get from Neon.tech
      - key: DB_PASSWORD
        sync: false # Get from Neon.tech
      - key: DB_PORT
        value: 5432
      - key: REDIS_URL
        sync: false # Get from Upstash
      - key: RABBITMQ_URL
        sync: false # Get from CloudAMQP
